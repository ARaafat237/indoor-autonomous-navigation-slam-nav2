ekf_filter_node:
  ros__parameters:
    frequency: 10.0
    sensor_timeout: 0.2
    two_d_mode: true
    print_diagnostics: true
    debug: false

    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    transform_time_offset: 0.0
    transform_timeout: 0.0

    odom0: /odom_raw
    odom0_config: [
      true,  true,  false,
      false, false, true,
      true,  true,  false,
      false, false, true,
      false, false, false
    ]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 5
    odom0_nodelay: false

    # Temporarily keep IMU out of the EKF yaw solution.
    # Live tests showed /odom_raw staying straight while /odometry/filtered
    # invented large yaw during forward motion. This baseline makes filtered
    # odom follow wheel odom first; IMU yaw-rate can be reintroduced only after
    # gyro bias/noise under motion is calibrated.
