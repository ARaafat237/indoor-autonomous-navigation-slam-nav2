amcl:
  ros__parameters:
    use_sim_time: False

    # map -> odom -> base_footprint -> base_link -> laser
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    global_frame_id: "map"

    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    scan_topic: /scan
    tf_broadcast: true
    transform_tolerance: 2.0

    # Stability tune: trust IMU/EKF rotation more between updates so AMCL
    # doesn't have to fight wheel-slip rotational noise.
    alpha1: 0.15
    alpha2: 0.15
    alpha3: 0.25
    alpha4: 0.25
    alpha5: 0.25

    min_particles: 1000
    max_particles: 2500
    # More beams per update = stronger angular constraint, less orientation
    # wobble in feature-poor regions.
    max_beams: 120

    laser_model_type: "likelihood_field"
    laser_likelihood_max_dist: 1.2
    laser_max_range: 10.0
    laser_min_range: -1.0

    # Reverted from the tightened values (z_hit 0.85 / z_rand 0.05 /
    # sigma_hit 0.10) which overshot into kidnap-style pose jumps —
    # AMCL was relocating the robot ~40-50cm when scans matched an
    # alternative mode better. Back to the looser baseline that
    # tolerates ambiguous scans without large jumps.
    z_hit: 0.7
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.15
    sigma_hit: 0.18
    lambda_short: 0.1

    do_beamskip: true
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3

    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    save_pose_rate: 0.5

    update_min_d: 0.04
    update_min_a: 0.10

